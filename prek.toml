minimum_prek_version = "0.3.0"

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files" },
  { id = "check-yaml" },
  { id = "check-toml" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.21"
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "meta"
hooks = [
  { id = "check-hooks-apply" },
  { id = "check-useless-excludes" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "check-skill-frontmatter", name = "Validate SKILL.md frontmatter against agentskills.io spec", language = "python", language_version = "python3", additional_dependencies = ["pyyaml>=6"], entry = "python scripts/check-skill-frontmatter.py", files = "(?:^|/)SKILL\\.md$", pass_filenames = true },
  { id = "agent-bot-identity-selflocate", name = "agent-bot-identity: shared scripts self-locate and fail closed", language = "system", entry = "bash agent-bot-identity/tests/selflocate-test.sh", files = "^agent-bot-identity/scripts/", pass_filenames = false },
  { id = "validate-mcp-fixtures", name = "agent-friendly-mcp: wire fixtures conform to the outputSchema/error contract", language = "python", language_version = "python3", additional_dependencies = ["jsonschema>=4"], entry = "python agent-friendly-mcp/tests/validate_fixture.py", files = "^agent-friendly-mcp/tests/fixtures/.*\\.json$", pass_filenames = true },
]
