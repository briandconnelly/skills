name: prek

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: prek-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install prek
        run: uv tool install prek==0.3.11
      - name: Run prek hooks
        run: prek run --all-files
